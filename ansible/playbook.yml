---
- name: Configure Kubernetes Nodes
  hosts: all
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install curl
      apt:
        name: curl
        state: present

    - name: Enable Docker
      service:
        name: docker
        enabled: yes
        state: started
