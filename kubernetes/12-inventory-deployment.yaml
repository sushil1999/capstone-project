apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:

      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z mysql 3306
          do
            echo Waiting for MySQL...
            sleep 2
          done

      containers:

      - name: inventory-service

        image: sushilsaroya/inventory-service:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5002

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: password

        - name: DB_NAME
          value: ecommerce
