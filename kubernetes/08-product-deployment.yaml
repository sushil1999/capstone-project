apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:

      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z mysql 3306
          do
            echo "Waiting for MySQL..."
            sleep 2
          done

      containers:

      - name: product-service

        image: sushilsaroya/product-service:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: password

        - name: DB_NAME
          value: ecommerce

        readinessProbe:
          httpGet:
            path: /products
            port: 5000

          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /products
            port: 5000

          initialDelaySeconds: 30
          periodSeconds: 15
